name: android_build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17 (Oracle)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'oracle'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-36
            build-tools;36.0.0
      
      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
      
      - id: get-project
        name: Get project name
        run: |
          PROJECT=$(cat project-to-build)
          echo "PROJECT=$PROJECT" >> $GITHUB_OUTPUT
      
      - name: Clone project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project
      
      - name: Configure build.gradle for arm64-v8a only
        working-directory: ./project
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          if [ -z "$APP_BUILD_GRADLE" ]; then
            echo "找不到 app/build.gradle 文件"
            exit 1
          fi
          
          echo "找到文件: $APP_BUILD_GRADLE"
          cp $APP_BUILD_GRADLE ${APP_BUILD_GRADLE}.backup
          
          # 检查是否已存在 abiFilters 配置
          if ! grep -q "abiFilters" $APP_BUILD_GRADLE; then
            # 使用 printf 和 cat 来避免 sed 转义问题
            if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
              # Kotlin DSL
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters(\"arm64-v8a\")"; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            else
              # Groovy DSL
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters \"arm64-v8a\""; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            fi
            echo "已添加 ndk abiFilters 配置"
          else
            echo "abiFilters 配置已存在"
          fi
          
          echo "=== 修改后的配置 ==="
          grep -A 5 "abiFilters" $APP_BUILD_GRADLE || echo "未找到"
      
      - name: Configure build for release
        working-directory: ./project
        if: github.event.inputs.build_type == 'release'
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          # 启用资源压缩和代码混淆
          if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
            # Kotlin DSL
            sed -i 's/minifyEnabled = false/minifyEnabled = true/g' $APP_BUILD_GRADLE
            sed -i 's/shrinkResources = false/shrinkResources = true/g' $APP_BUILD_GRADLE
          else
            # Groovy DSL
            sed -i 's/minifyEnabled false/minifyEnabled true/g' $APP_BUILD_GRADLE
            sed -i 's/shrinkResources false/shrinkResources true/g' $APP_BUILD_GRADLE
          fi
          
          echo "已为 release 构建启用资源压缩"
      
      - name: Setup Gradle wrapper
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            project/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('project/**/*.gradle*', 'project/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build APK for arm64-v8a
        working-directory: ./project
        run: |
          echo "=== 构建环境信息 ==="
          java -version
          ./gradlew --version
          
          echo "开始构建 ${{ github.event.inputs.build_type }} APK"
          ./gradlew assemble${{ github.event.inputs.build_type }} --stacktrace --no-daemon
          
          echo "=== 生成的 APK 文件 ==="
          find . -name "*.apk" -type f | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            echo "$apk - 大小: $size"
          done
      
      - name: Rename APK
        working-directory: ./project
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -1)
          
          if [ -n "$APK_FILE" ]; then
            APK_DIR=$(dirname "$APK_FILE")
            NEW_NAME="$APK_DIR/app-arm64-v8a-${{ github.event.inputs.build_type }}.apk"
            mv "$APK_FILE" "$NEW_NAME"
            echo "APK 已重命名为: $NEW_NAME"
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-${{ github.event.inputs.build_type }}
          path: ./project/**/app-arm64-v8a-*.apk
          retention-days: 7
      
      - name: Generate size report
        working-directory: ./project
        run: |
          echo "# APK 体积分析报告" > size_report.md
          echo "" >> size_report.md
          echo "## 构建配置" >> size_report.md
          echo "- 目标架构: arm64-v8a" >> size_report.md
          echo "- 构建类型: ${{ github.event.inputs.build_type }}" >> size_report.md
          echo "- compileSdk: 36" >> size_report.md
          echo "- targetSdk: 36" >> size_report.md
          echo "- minSdk: 29" >> size_report.md
          echo "" >> size_report.md
          echo "## APK 信息" >> size_report.md
          
          find . -name "*.apk" -type f | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "- $name: $size" >> size_report.md
          done
          
          cat size_report.md
      
      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: ./project/size_report.md
          retention-days: 7
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./project/**/.gradle/console.log
            ./project/**/build/reports/
          retention-days: 7
