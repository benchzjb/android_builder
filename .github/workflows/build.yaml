name: android_build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
      
      - id: get-project
        name: Get project name
        run: |
          PROJECT=$(cat project-to-build)
          echo "PROJECT=$PROJECT" >> $GITHUB_OUTPUT
      
      - name: Clone project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project
      
      - name: Debug project structure
        working-directory: ./project
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== Build files ==="
          find . -maxdepth 2 -name "*.gradle*" -type f
          echo "=== Gradle wrapper ==="
          ls -la gradlew 2>/dev/null || echo "gradlew not found"
      
      - name: Build the app
        working-directory: ./project
        run: |
          # 设置 Gradle 用户主目录
          export GRADLE_USER_HOME=$HOME/.gradle
          
          # 如果没有 gradlew，生成它
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, creating..."
            gradle wrapper
          fi
          
          # 给执行权限
          chmod +x gradlew
          
          # 尝试列出可用任务（调试用）
          echo "=== Available Gradle tasks ==="
          ./gradlew tasks --all --no-daemon || true
          
          # 尝试构建
          echo "=== Building APK ==="
          ./gradlew assembleDebug --stacktrace --info --no-daemon
      
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: my-build-apk
          path: ./project/**/*.apk
          retention-days: 7
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: ./project/**/.gradle/console.log
          retention-days: 7
