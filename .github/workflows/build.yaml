name: android_build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.jvmargs=-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'  # 使用 Temurin 更稳定
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
      
      - id: get-project
        name: Get project name
        run: |
          PROJECT=$(cat project-to-build)
          echo "PROJECT=$PROJECT" >> $GITHUB_OUTPUT
          echo "项目地址: $PROJECT"
      
      - name: Clone project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project
      
      - name: Fix Gradle version (downgrade to 8.7)
        working-directory: ./project
        run: |
          # 检查并降级 Gradle 版本
          if [ -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "原始 Gradle 配置:"
            cat gradle/wrapper/gradle-wrapper.properties
            echo ""
            echo "降级 Gradle 到 8.7..."
            sed -i 's|gradle-.*-bin.zip|gradle-8.7-bin.zip|g' gradle/wrapper/gradle-wrapper.properties
            echo "修改后的配置:"
            cat gradle/wrapper/gradle-wrapper.properties
          else
            echo "未找到 gradle-wrapper.properties，将创建默认配置"
            mkdir -p gradle/wrapper
            echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.7-bin.zip" > gradle/wrapper/gradle-wrapper.properties
          fi
      
      - name: Configure build.gradle for arm64-v8a only
        working-directory: ./project
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          if [ -z "$APP_BUILD_GRADLE" ]; then
            echo "警告: 找不到 app/build.gradle 文件"
            echo "尝试查找所有 build.gradle 文件:"
            find . -name "build.gradle*" -type f
            exit 1
          fi
          
          echo "找到文件: $APP_BUILD_GRADLE"
          cp $APP_BUILD_GRADLE ${APP_BUILD_GRADLE}.backup
          
          # 检查是否已存在 abiFilters 配置
          if ! grep -q "abiFilters" $APP_BUILD_GRADLE; then
            if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
              # Kotlin DSL
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters(\"arm64-v8a\")"; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            else
              # Groovy DSL
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters \"arm64-v8a\""; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            fi
            echo "已添加 ndk abiFilters 配置"
          else
            echo "abiFilters 配置已存在"
          fi
      
      - name: Configure release build optimizations
        working-directory: ./project
        if: github.event.inputs.build_type == 'release'
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
            sed -i 's/minifyEnabled = false/minifyEnabled = true/g' $APP_BUILD_GRADLE || true
            sed -i 's/shrinkResources = false/shrinkResources = true/g' $APP_BUILD_GRADLE || true
          else
            sed -i 's/minifyEnabled false/minifyEnabled true/g' $APP_BUILD_GRADLE || true
            sed -i 's/shrinkResources false/shrinkResources true/g' $APP_BUILD_GRADLE || true
          fi
          echo "已为 release 构建启用优化"
      
      - name: Setup Gradle wrapper
        working-directory: ./project
        run: |
          if [ ! -f "gradlew" ]; then
            echo "生成 gradle wrapper..."
            gradle wrapper
          fi
          chmod +x gradlew
          # 更新 gradle-wrapper.jar
          ./gradlew wrapper --gradle-version 8.7 || true
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            project/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('project/**/*.gradle*', 'project/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build APK for arm64-v8a
        working-directory: ./project
        run: |
          echo "=== 构建环境信息 ==="
          java -version
          echo "Gradle 版本:"
          ./gradlew --version || {
            echo "Gradle wrapper 可能损坏，重新生成..."
            gradle wrapper --gradle-version 8.7
            chmod +x gradlew
            ./gradlew --version
          }
          
          echo ""
          echo "开始构建 ${{ github.event.inputs.build_type }} APK (arm64-v8a only)"
          echo ""
          
          # 使用更保守的 JVM 参数
          ./gradlew assemble${{ github.event.inputs.build_type }} \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
          
          echo ""
          echo "=== 生成的 APK 文件 ==="
          find . -name "*.apk" -type f | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            echo "📦 $apk - 大小: $size"
          done
      
      - name: Rename APK
        working-directory: ./project
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -1)
          
          if [ -n "$APK_FILE" ]; then
            APK_DIR=$(dirname "$APK_FILE")
            NEW_NAME="$APK_DIR/app-arm64-v8a-${{ github.event.inputs.build_type }}.apk"
            mv "$APK_FILE" "$NEW_NAME"
            echo "✅ APK 已重命名为: $NEW_NAME"
            echo "APK_PATH=$NEW_NAME" >> $GITHUB_ENV
          else
            echo "❌ 未找到 APK 文件"
            # 列出构建输出目录
            echo "构建输出目录内容:"
            find app/build/outputs -type f 2>/dev/null || echo "无输出"
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-${{ github.event.inputs.build_type }}
          path: ./project/**/app-arm64-v8a-*.apk
          retention-days: 7
          if-no-files-found: error
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./project/**/.gradle/console.log
            ./project/**/build/reports/
            ./project/**/build/outputs/logs/
          retention-days: 7
          if-no-files-found: warn
