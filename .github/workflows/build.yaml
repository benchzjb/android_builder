name: android_build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout the code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" || true
      
      - id: get-project
        name: Get project name
        run: |
          PROJECT=$(cat project-to-build)
          echo "PROJECT=$PROJECT" >> $GITHUB_OUTPUT
          echo "项目地址: $PROJECT"
      
      - name: Clone project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project
      
      - name: Fix Gradle version to 8.11.1
        working-directory: ./project
        run: |
          # 确保 gradle/wrapper 目录存在
          mkdir -p gradle/wrapper
          
          # 设置正确的 Gradle 版本
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.11.1-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          echo "Gradle 版本已设置为 8.11.1"
          cat gradle/wrapper/gradle-wrapper.properties
          
          # 下载对应版本的 gradle-wrapper.jar
          ./gradlew wrapper --gradle-version 8.11.1 2>/dev/null || {
            echo "使用内置方法生成 wrapper..."
            # 如果上面命令失败，尝试用 gradle 命令
            if command -v gradle &> /dev/null; then
              gradle wrapper --gradle-version 8.11.1
            fi
          }
      
      - name: Configure build.gradle for arm64-v8a only
        working-directory: ./project
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          if [ -z "$APP_BUILD_GRADLE" ]; then
            echo "警告: 找不到 app/build.gradle 文件"
            find . -name "build.gradle*" -type f
            exit 1
          fi
          
          echo "找到文件: $APP_BUILD_GRADLE"
          cp $APP_BUILD_GRADLE ${APP_BUILD_GRADLE}.backup
          
          # 检查是否已存在 abiFilters 配置
          if ! grep -q "abiFilters" $APP_BUILD_GRADLE; then
            if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
              # Kotlin DSL - 在 defaultConfig 块内添加
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters(\"arm64-v8a\")"; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            else
              # Groovy DSL
              awk '/defaultConfig {/{print; print "        ndk {"; print "            abiFilters \"arm64-v8a\""; print "        }"; next}1' $APP_BUILD_GRADLE > temp.gradle && mv temp.gradle $APP_BUILD_GRADLE
            fi
            echo "已添加 ndk abiFilters 配置"
          else
            echo "abiFilters 配置已存在"
          fi
          
          echo "=== 修改后的配置 ==="
          grep -A 5 "abiFilters" $APP_BUILD_GRADLE || echo "未找到"
      
      - name: Configure release build optimizations
        working-directory: ./project
        if: github.event.inputs.build_type == 'release'
        run: |
          APP_BUILD_GRADLE=$(find . -path "*/app/build.gradle" -o -path "*/app/build.gradle.kts" | head -1)
          
          if [[ "$APP_BUILD_GRADLE" == *.kts ]]; then
            sed -i 's/minifyEnabled = false/minifyEnabled = true/g' $APP_BUILD_GRADLE || true
            sed -i 's/shrinkResources = false/shrinkResources = true/g' $APP_BUILD_GRADLE || true
            # 如果没找到，尝试在 buildTypes 块中添加
            if ! grep -q "minifyEnabled true" $APP_BUILD_GRADLE; then
              echo "在 Kotlin DSL 中添加混淆配置..."
              sed -i '/buildTypes {/a\
        release {\
            isMinifyEnabled = true\
            isShrinkResources = true\
            proguardFiles(\
                getDefaultProguardFile("proguard-android-optimize.txt"),\
                "proguard-rules.pro"\
            )\
        }\
' $APP_BUILD_GRADLE
            fi
          else
            sed -i 's/minifyEnabled false/minifyEnabled true/g' $APP_BUILD_GRADLE || true
            sed -i 's/shrinkResources false/shrinkResources true/g' $APP_BUILD_GRADLE || true
          fi
          echo "已为 release 构建启用优化"
      
      - name: Setup Gradle wrapper
        working-directory: ./project
        run: |
          chmod +x gradlew 2>/dev/null || true
          # 确保 gradlew 存在
          if [ ! -f "gradlew" ]; then
            echo "生成 gradle wrapper..."
            gradle wrapper --gradle-version 8.11.1
            chmod +x gradlew
          fi
      
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            project/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('project/**/*.gradle*', 'project/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Build APK for arm64-v8a
        working-directory: ./project
        run: |
          echo "=== 构建环境信息 ==="
          java -version
          echo ""
          echo "Gradle 版本:"
          ./gradlew --version
          echo ""
          
          echo "开始构建 ${{ github.event.inputs.build_type }} APK (arm64-v8a only)"
          echo ""
          
          # 添加 JVM 参数解决 Cgroup 问题
          ./gradlew assemble${{ github.event.inputs.build_type }} \
            --stacktrace \
            --no-daemon \
            -Dorg.gradle.jvmargs="-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"
          
          echo ""
          echo "=== 生成的 APK 文件 ==="
          find . -name "*.apk" -type f | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            size_mb=$(du -m "$apk" | cut -f1)
            echo "📦 $apk - 大小: $size ($size_mb MB)"
          done
      
      - name: Rename APK
        working-directory: ./project
        run: |
          APK_FILE=$(find . -name "*.apk" -type f | grep -v "unaligned" | head -1)
          
          if [ -n "$APK_FILE" ]; then
            APK_DIR=$(dirname "$APK_FILE")
            NEW_NAME="$APK_DIR/app-arm64-v8a-${{ github.event.inputs.build_type }}.apk"
            mv "$APK_FILE" "$NEW_NAME"
            echo "✅ APK 已重命名为: $NEW_NAME"
          else
            echo "❌ 未找到 APK 文件"
            echo "查找构建输出目录:"
            find app/build/outputs -type f 2>/dev/null || echo "无输出"
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-arm64-v8a-${{ github.event.inputs.build_type }}
          path: ./project/**/app-arm64-v8a-*.apk
          retention-days: 7
          if-no-files-found: error
      
      - name: Generate size report
        working-directory: ./project
        run: |
          echo "# APK 体积分析报告" > size_report.md
          echo "" >> size_report.md
          echo "## 构建配置" >> size_report.md
          echo "- 目标架构: arm64-v8a only" >> size_report.md
          echo "- 构建类型: ${{ github.event.inputs.build_type }}" >> size_report.md
          echo "- AGP 版本: 9.0.1" >> size_report.md
          echo "- Gradle 版本: 8.11.1" >> size_report.md
          echo "" >> size_report.md
          echo "## APK 信息" >> size_report.md
          
          find . -name "*.apk" -type f | while read apk; do
            size=$(du -h "$apk" | cut -f1)
            size_mb=$(du -m "$apk" | cut -f1)
            name=$(basename "$apk")
            echo "- **$name**: $size ($size_mb MB)" >> size_report.md
          done
          
          cat size_report.md
      
      - name: Upload size report
        uses: actions/upload-artifact@v4
        with:
          name: size-report
          path: ./project/size_report.md
          retention-days: 7
      
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./project/**/.gradle/console.log
            ./project/**/build/reports/
            ./project/**/build/outputs/logs/
          retention-days: 7
          if-no-files-found: warn
